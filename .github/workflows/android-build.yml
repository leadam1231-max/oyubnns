name: Android APK Derleme

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Repodaki Kodu Çek
      uses: actions/checkout@v4

    - name: Java JDK 17 Kurulumu
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Gradle'a Çalışma İzni Ver
      run: chmod +x ./gradlew

    - name: APK'yı Derle
      run: ./gradlew assembleDebug

    - name: Hazır APK Dosyasını İndirilebilir Yap
      uses: actions/upload-artifact@v4
      with:
        name: Ahenk-Oyun-APK
        path: app/build/outputs/apk/debug/*.apk
